<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-mode"> <!-- Default to dark mode for better glassmorphism -->
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <div class="calculator-wrapper glass">
            <div class="header">
                <h2>Calc</h2>
                <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">
                    <i class="fas fa-sun light-icon"></i>
                    <i class="fas fa-moon dark-icon"></i>
                </button>
            </div>
            
            <div class="display-section">
                <div class="error-msg" id="error-msg"></div>
                <div class="result" id="result">0</div>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <input type="number" id="num1" placeholder="First number" step="any">
                </div>
                <div class="input-group">
                    <input type="number" id="num2" placeholder="Second number" step="any">
                </div>
            </div>

            <div class="operations">
                <button class="op-btn" data-op="add"><i class="fas fa-plus"></i></button>
                <button class="op-btn" data-op="sub"><i class="fas fa-minus"></i></button>
                <button class="op-btn" data-op="mul"><i class="fas fa-times"></i></button>
                <button class="op-btn" data-op="div"><i class="fas fa-divide"></i></button>
            </div>
        </div>

        <div class="history-wrapper glass">
            <div class="history-header">
                <h3>History</h3>
                <button id="clear-history"><i class="fas fa-trash-alt"></i></button>
            </div>
            <ul class="history-list" id="history-list">
                <!-- History items will go here -->
            </ul>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
